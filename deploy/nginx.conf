# /etc/nginx/sites-available/niytri
# Redirect apex -> www, HTTP -> HTTPS handled by certbot after setup.

server {
    listen 80;
    server_name www.niytri.com niytri.com;

    # Certbot will rewrite this file to add SSL. Initial config just proxies.

    # Redirect apex to www
    if ($host = niytri.com) {
        return 301 https://www.niytri.com$request_uri;
    }

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
